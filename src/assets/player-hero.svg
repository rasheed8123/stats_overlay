<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" width="400" height="500">
  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="500" fill="transparent"/>
  
  <!-- Head -->
  <circle cx="200" cy="100" r="40" fill="#c19a6b"/>
  
  <!-- Body -->
  <rect x="160" y="145" width="80" height="120" rx="10" fill="url(#bodyGrad)"/>
  
  <!-- Arms -->
  <rect x="80" y="160" width="80" height="25" rx="12" fill="#c19a6b"/>
  <rect x="240" y="160" width="80" height="25" rx="12" fill="#c19a6b"/>
  
  <!-- Legs -->
  <rect x="170" y="270" width="30" height="100" rx="15" fill="#2d3748"/>
  <rect x="200" y="270" width="30" height="100" rx="15" fill="#2d3748"/>
  
  <!-- Cricket Bat -->
  <g transform="translate(280, 150) rotate(-30)">
    <rect x="0" y="0" width="80" height="12" rx="6" fill="#8b7355"/>
    <circle cx="0" cy="6" r="8" fill="#a0826d"/>
  </g>
  
  <!-- Accent glow -->
  <circle cx="200" cy="100" r="50" fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
</svg>
